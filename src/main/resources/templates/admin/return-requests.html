<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Return Requests</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">


<div class="container mt-5">


    <div class="card shadow">


        <div class="card-header bg-dark text-white">

            <h3>
                🔄 Return Requests
            </h3>

        </div>


        <div class="card-body">


            <table class="table table-bordered table-hover">


                <thead class="table-dark">

                <tr>

                    <th>Return ID</th>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Reason</th>
                    <th>Comments</th>
                    <th>Status</th>
                    <th>Action</th>

                </tr>

                </thead>


                <tbody>


                <tr th:each="returnRequest : ${returns}">


                    <td th:text="${returnRequest.id}"></td>


                    <td th:text="${returnRequest.order.id}">
                    </td>


                    <td th:text="${returnRequest.customerName}">
                    </td>


                    <td th:text="${returnRequest.reason}">
                    </td>


                    <td th:text="${returnRequest.comments}">
                    </td>


                    <td>

    <span th:if="${returnRequest.status == 'PENDING'}"
          class="badge bg-warning"
          th:text="${returnRequest.status}">
    </span>


                        <span th:if="${returnRequest.status == 'APPROVED'}"
                              class="badge bg-success"
                              th:text="${returnRequest.status}">
    </span>


                        <span th:if="${returnRequest.status == 'REJECTED'}"
                              class="badge bg-danger"
                              th:text="${returnRequest.status}">
    </span>

                    </td>


                    <td>


                        <a th:if="${returnRequest.status == 'PENDING'}"
                           th:href="@{'/admin/returns/approve/' + ${returnRequest.id}}"
                           class="btn btn-success btn-sm">

                            Approve

                        </a>


                        <a th:if="${returnRequest.status == 'PENDING'}"
                           th:href="@{'/admin/returns/reject/' + ${returnRequest.id}}"
                           class="btn btn-danger btn-sm">

                            Reject

                        </a>


                    </td>


                </tr>


                </tbody>


            </table>


        </div>


    </div>


</div>


</body>

</html>
