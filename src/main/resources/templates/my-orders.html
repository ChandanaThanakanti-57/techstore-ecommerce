<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>My Orders</title>
</head>
<body>

<h1>My Orders</h1>
<a th:href="@{/products}" class="btn btn-primary">
    Back to Products
</a>

<a th:href="@{/logout}" class="btn btn-danger">
    Logout
</a>
<table class="table table-striped table-bordered">

        <tr>
            <th>Order ID</th>
            <th>Customer Name</th>
            <th>Address</th>
            <th>Phone Number</th>
            <th>Total Amount</th>
            <th>Status</th>
            <th>Email</th>
            <th>Action</th>
            <th>Order Date</th>
        </tr>

        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.customerName}"></td>
            <td th:text="${order.address}"></td>
            <td th:text="${order.phoneNumber}"></td>
            <td th:text="${order.totalAmount}"></td>
            <td><a th:href="@{/track-order/{id}(id=${order.id})}"
               class="btn btn-info btn-sm">

                Track Order

            </a></td>
            <td th:text="${order.status}"></td>
            <td th:text="${order.userEmail}"></td>
            <td>
                <a th:href="@{/order-details/{id}(id=${order.id})}"
                   class="btn btn-sm btn-primary">
                    View Details
                </a>
            </td>
            <td th:text="${#temporals.format(order.orderDate, 'dd-MMM-yyyy hh:mm a')}"></td>
        </tr>




</table>

</body>
</html>
