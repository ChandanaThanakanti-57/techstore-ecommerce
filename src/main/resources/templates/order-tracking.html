<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Track Order</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        .timeline-step {
            display: flex;
            align-items: flex-start;
        }

        .timeline-icon {
            width: 40px;
            text-align: center;
            font-size: 24px;
        }

        .timeline-line {
            width: 4px;
            height: 50px;
            margin: auto;
        }

        .completed-line {
            background-color: #28a745;
        }

        .pending-line {
            background-color: #d6d6d6;
        }

        .timeline-content {
            margin-left: 20px;
            padding-top: 5px;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h1>
        Track Order #
        <span th:text="${order.id}"></span>
    </h1>

    <hr>

    <!-- ORDERED -->

    <div class="timeline-step">

        <div>

            <div class="timeline-icon">

                <span th:if="${order.status=='Ordered'
                        || order.status=='Confirmed'
                        || order.status=='Shipped'
                        || order.status=='Out For Delivery'
                        || order.status=='Delivered'}">

                    ✅

                </span>

                <span th:unless="${order.status=='Ordered'
                        || order.status=='Confirmed'
                        || order.status=='Shipped'
                        || order.status=='Out For Delivery'
                        || order.status=='Delivered'}">

                    ⚪

                </span>

            </div>

            <div class="timeline-line completed-line"></div>

        </div>

        <div class="timeline-content">

            <h3>Ordered</h3>

        </div>

    </div>

    <!-- CONFIRMED -->

    <div class="timeline-step">

        <div>

            <div class="timeline-icon">

                <span th:if="${order.status=='Confirmed'
                        || order.status=='Shipped'
                        || order.status=='Out For Delivery'
                        || order.status=='Delivered'}">

                    ✅

                </span>

                <span th:unless="${order.status=='Confirmed'
                        || order.status=='Shipped'
                        || order.status=='Out For Delivery'
                        || order.status=='Delivered'}">

                    ⚪

                </span>

            </div>

            <div th:class="${order.status=='Confirmed'
                    || order.status=='Shipped'
                    || order.status=='Out For Delivery'
                    || order.status=='Delivered'}
                    ? 'timeline-line completed-line'
                    : 'timeline-line pending-line'">
            </div>

        </div>

        <div class="timeline-content">

            <h3>Confirmed</h3>

        </div>

    </div>

    <!-- SHIPPED -->

    <div class="timeline-step">

        <div>

            <div class="timeline-icon">

                <span th:if="${order.status=='Shipped'
                        || order.status=='Out For Delivery'
                        || order.status=='Delivered'}">

                    ✅

                </span>

                <span th:unless="${order.status=='Shipped'
                        || order.status=='Out For Delivery'
                        || order.status=='Delivered'}">

                    ⚪

                </span>

            </div>

            <div th:class="${order.status=='Shipped'
                    || order.status=='Out For Delivery'
                    || order.status=='Delivered'}
                    ? 'timeline-line completed-line'
                    : 'timeline-line pending-line'">
            </div>

        </div>

        <div class="timeline-content">

            <h3>Shipped</h3>

        </div>

    </div>

    <!-- OUT FOR DELIVERY -->

    <div class="timeline-step">

        <div>

            <div class="timeline-icon">

                <span th:if="${order.status=='Out For Delivery'
                        || order.status=='Delivered'}">

                    ✅

                </span>

                <span th:unless="${order.status=='Out For Delivery'
                        || order.status=='Delivered'}">

                    ⚪

                </span>

            </div>

            <div th:class="${order.status=='Out For Delivery'
                    || order.status=='Delivered'}
                    ? 'timeline-line completed-line'
                    : 'timeline-line pending-line'">
            </div>

        </div>

        <div class="timeline-content">

            <h3>Out For Delivery</h3>

        </div>

    </div>

    <!-- DELIVERED -->

    <div class="timeline-step">

        <div>

            <div class="timeline-icon">

                <span th:if="${order.status=='Delivered'}">

                    ✅

                </span>

                <span th:unless="${order.status=='Delivered'}">

                    ⚪

                </span>

            </div>

        </div>

        <div class="timeline-content">

            <h3>Delivered</h3>

        </div>

    </div>

    <br>

    <a th:href="@{/my-orders}"
       class="btn btn-secondary">

        Back To Orders

    </a>

</div>

</body>
</html>
