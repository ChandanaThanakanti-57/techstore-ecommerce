<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <h1>Checkout</h1>

    <form id="checkoutForm"
          th:action="@{/place-order}"
          method="post">

        <div class="mb-3">
            <label class="form-label">Customer Name</label>
            <input type="text"
                   name="customerName"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea name="address"
                      class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text"
                   name="phoneNumber"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Coupon Code</label>

            <input type="text"
                   name="couponCode"
                   class="form-control"
                   placeholder="Enter Coupon Code">
        </div>

        <input type="hidden"
               id="razorpayPaymentId"
               name="razorpayPaymentId">

        <input type="hidden"
               id="razorpayOrderId"
               name="razorpayOrderId">
        <input type="hidden"
               id="paymentStatus"
               name="paymentStatus"
               value="PENDING">

        <button type="button"
                onclick="mockPayment()"
                class="btn btn-success">
            Pay Now
        </button>

    </form>


</div>
<script>

    function mockPayment() {

        if(confirm(
            "Mock Payment Successful?\n\nClick OK to simulate payment."
        )) {

            document.getElementById(
                "paymentStatus"
            ).value = "PAID";

            document.getElementById(
                "checkoutForm"
            ).submit();
        }
    }

</script>

</body>
</html>
