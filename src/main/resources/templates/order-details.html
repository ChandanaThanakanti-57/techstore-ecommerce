<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Details</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Order Details</h3>
        </div>

        <div class="card-body">

            <p><strong>Order ID:</strong>
                <span th:text="${order.id}"></span>
            </p>

            <p><strong>Customer:</strong>
                <span th:text="${order.customerName}"></span>
            </p>

            <p><strong>Address:</strong>
                <span th:text="${order.address}"></span>
            </p>

            <p><strong>Phone:</strong>
                <span th:text="${order.phoneNumber}"></span>
            </p>

            <p><strong>Email:</strong>
                <span th:text="${order.userEmail}"></span>
            </p>

            <p><strong>Total Amount:</strong>
                <span th:text="${#numbers.formatDecimal(order.totalAmount, 0, 0)}"></span>
            </p>

            <p>
                <strong>Status:</strong>
                <span th:text="${order.status}"></span>
            </p>

            <p>
                <strong>Order Date:</strong>
                <span th:text="${#temporals.format(order.orderDate, 'dd-MMM-yyyy hh:mm a')}"></span>
            </p>

            <h4 class="mt-4">Products Ordered</h4>

            <table class="table table-bordered">

                <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="item : ${order.items}">

                    <td th:text="${item.productName}"></td>

                    <td>
                        ₹<span th:text="${item.price}"></span>
                    </td>

                    <td th:text="${item.quantity}"></td>

                </tr>

                </tbody>

            </table>

            <a th:href="@{/my-orders}"
               class="btn btn-secondary">
                Back to Orders
            </a>

        </div>

    </div>

</div>

</body>
</html>
