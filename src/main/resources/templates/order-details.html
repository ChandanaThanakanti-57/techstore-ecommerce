<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Order Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h2 class="mb-0">
                📦 Order #<span th:text="${order.id}"></span>
            </h2>

        </div>

        <div class="card-body">

            <div class="row">

                <!-- Customer Information -->
                <div class="col-md-6">

                    <div class="card mb-3">

                        <div class="card-header fw-bold">
                            👤 Customer Information
                        </div>

                        <div class="card-body">

                            <p><strong>Name:</strong>
                                <span th:text="${order.customerName}"></span>
                            </p>

                            <p><strong>Phone:</strong>
                                <span th:text="${order.phoneNumber}"></span>
                            </p>

                            <p><strong>Email:</strong>
                                <span th:text="${order.userEmail}"></span>
                            </p>

                        </div>

                    </div>

                </div>

                <!-- Shipping -->
                <div class="col-md-6">

                    <div class="card mb-3">

                        <div class="card-header fw-bold">
                            📍 Shipping Address
                        </div>

                        <div class="card-body">

                            <p th:text="${order.address}"></p>

                        </div>

                    </div>

                </div>

            </div>

            <div class="row">

                <!-- Payment -->
                <div class="col-md-6">

                    <div class="card mb-4">

                        <div class="card-header fw-bold">
                            💳 Payment Information
                        </div>

                        <div class="card-body">

                            <p>
                                <strong>Status:</strong>

                                <span th:if="${order.status == 'Paid'}"
                                      class="badge bg-success">
        Paid
    </span>

                                <span th:if="${order.status == 'Cancelled'}"
                                      class="badge bg-danger">
        Cancelled
    </span>
                            </p>

                            <p>
                                <strong>Total:</strong>

                                ₹<span th:text="${#numbers.formatDecimal(order.totalAmount,1,'COMMA',2,'POINT')}"></span>
                            </p>

                            <p>
                                <strong>Coupon:</strong>

                                <span th:text="${order.couponCode != null ? order.couponCode : 'No Coupon'}"></span>
                            </p>

                            <p>
                                <strong>Order Date:</strong>

                                <span th:text="${order.orderDate}"></span>
                            </p>

                        </div>

                    </div>

                </div>

            </div>

            <h3 class="mb-3">
                🛒 Products Ordered
            </h3>

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>

                    <th>Image</th>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="item : ${orderItems}">

                    <td style="width:120px">

                        <img th:src="${item.imageUrl}"
                             width="90"
                             height="90"
                             class="img-thumbnail">

                    </td>

                    <td th:text="${item.productName}"></td>

                    <td>

                        ₹<span th:text="${item.price}"></span>

                    </td>

                    <td th:text="${item.quantity}"></td>

                </tr>

                </tbody>

            </table>

            <div class="mt-4">

                <a th:href="@{/orders}"
                   class="btn btn-secondary">

                    ← Back to Orders

                </a>

                <a th:href="@{'/invoice/' + ${order.id}}"
                   class="btn btn-danger">

                    📄 Download Invoice

                </a>

                <div class="mt-3">

                    <form th:if="${order.status == 'Paid'}"
                          th:action="@{'/cancel-order/' + ${order.id}}"
                          method="post">

                        <button class="btn btn-warning"
                                onclick="return confirm('Are you sure you want to cancel this order?')">

                            ❌ Cancel Order

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
