<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tech Store Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .product-image{
            width:100%;
            height:250px;
            object-fit:contain;
            object-position:center;
            background:#fff;
            padding:10px;
        }

        .product-card{
            height:100%;
            display:flex;
            flex-direction:column;
        }

        .product-card .card-body{
            flex:1;
            display:flex;
            flex-direction:column;
        }

        .button-group{
            margin-top:auto;
        }

        .card-title{
            min-height:55px;
            font-weight:600;
        }

        .price{
            color:#198754;
            font-size:1.4rem;
            font-weight:bold;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid position-relative">

        <!-- Center Logo -->
        <a class="navbar-brand fw-bold position-absolute start-50 translate-middle-x"
           th:href="@{/}">
            Tech Store
        </a>

        <!-- Right-side Menu -->
        <div class="ms-auto">

            <!-- Before Login -->
            <th:block th:if="${session.loggedInUser == null}">
                <a class="nav-link d-inline text-white fw-bold me-3"
                   th:href="@{/login}">
                    Login
                </a>
            </th:block>

            <!-- After Login -->
            <th:block th:if="${session.loggedInUser != null}">


                <a class="nav-link d-inline text-white fw-bold me-3"
                   th:href="@{/products}">
                    Products
                </a>

                <a class="nav-link d-inline text-white fw-bold me-3"
                   th:href="@{/wishlist}">
                    Wishlist
                </a>

                <a class="nav-link d-inline text-white fw-bold me-3"
                   th:href="@{/cart}">
                    Cart
                </a>

                <a class="nav-link d-inline text-white fw-bold me-3"
                   th:href="@{/orders}">
                    My Orders
                </a>

                <a class="nav-link d-inline text-white fw-bold me-3"
                   th:href="@{/refunds}">
                    My Refunds
                </a>

                <a class="nav-link d-inline text-white fw-bold me-3"
                   th:href="@{/profile}">
                    Profile
                </a>

                <th:block th:if="${session.loggedInUser.role == 'ADMIN'}">
                    <a class="nav-link d-inline text-warning fw-bold me-3"
                       th:href="@{/admin}">
                        Admin
                    </a>
                </th:block>

                <a class="nav-link d-inline text-danger fw-bold me-3"
                   th:href="@{/logout}">
                    Logout
                </a>

            </th:block>

        </div>

    </div>

</nav>

<p th:if="${user != null}">
    Welcome,
    <span th:text="${user.name}"></span>
</p>

<form action="/products/search"
      method="get"
      class="row g-3 align-items-end mt-2 mb-4">

    <div class="col-md-5 position-relative">

        <input type="text"
               id="searchBox"
               name="keyword"
               class="form-control"
               placeholder="Search products">

        <div id="suggestionsBox"
             class="list-group position-absolute w-100 shadow"
             style="z-index:1000;">
        </div>

    </div>

    <div class="col-md-4">

        <select name="category"
                class="form-select">

            <option value="">All Categories</option>
            <option value="Electronics">Electronics</option>
            <option value="Accessories">Accessories</option>
            <option value="Laptop">Laptop</option>

        </select>

    </div>

    <div class="col-md-3">

        <button type="submit"
                class="btn btn-primary w-100">
            Search
        </button>

    </div>

</form>

<div class="container mt-4">

    <h1 class="text-center mb-4">Tech Store Products</h1>

    <a th:href="@{/products}" class="btn btn-secondary mb-3">
        Show All Products
    </a>

    <a th:if="${session.loggedInUser != null
        and session.loggedInUser.role == 'ADMIN'}"
       href="/admin/add-product"
       class="btn btn-secondary mb-3 btn btn-success">
        Add New Product
    </a>
    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="product : ${products}">

            <div class="card shadow-lg border-0 product-card">

                <img th:src="${product.imageUrl != null && !product.imageUrl.isEmpty()
              ? product.imageUrl
              : 'https://via.placeholder.com/300x220?text=No+Image'}"
                     class="card-img-top product-image"
                     alt="Product Image">

                <div class="card-body">

                    <h5 class="card-title"
                        th:text="${product.name}">
                    </h5>

                    <p class="card-text">
                        <strong>Category:</strong>
                        <span th:text="${product.category}"></span>
                    </p>

                    <p class="price">
                        ₹<span th:text="${#numbers.formatDecimal(product.price,1,2)}"></span>
                    </p>



                    <div class="d-flex gap-2 flex-wrap button-group">

                        <th:block th:if="${session.loggedInUser != null and session.loggedInUser.role == 'ADMIN'}">

                            <a th:href="@{/edit-product/{id}(id=${product.id})}"
                               class="btn btn-warning">
                                Edit
                            </a>

                            <a th:href="@{/delete-product/{id}(id=${product.id})}"
                               class="btn btn-danger">
                                Delete
                            </a>

                        </th:block>

                        <a th:href="@{/cart/add/{id}(id=${product.id})}"
                           class="btn btn-primary">
                            Add to Cart
                        </a>

                        <a th:href="@{/products/{id}(id=${product.id})}"
                           class="btn btn-success">
                            View Details
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>


</div>

<script>

    const searchBox =
        document.getElementById("searchBox");

    const suggestionsBox =
        document.getElementById("suggestionsBox");

    searchBox.addEventListener("keyup", function() {

        let keyword = this.value;

        if(keyword.length < 2){

            suggestionsBox.innerHTML = "";

            return;
        }

        fetch("/autocomplete?keyword=" + keyword)

            .then(response => response.json())

            .then(data => {

                suggestionsBox.innerHTML = "";

                data.forEach(product => {

                    suggestionsBox.innerHTML += `
                    <a href="/products/${product.id}"
                       class="list-group-item list-group-item-action">

                        <div class="d-flex align-items-center">

                            <img src="${product.imageUrl}"
                                 width="50"
                                 height="50"
                                 style="object-fit:contain;
       background:white;
       margin-right:10px;"

                            <div>

                                <div>${product.name}</div>

                                <small class="text-success">
                                    ₹${product.price}
                                </small>

                            </div>

                        </div>

                    </a>
                `;
                });

            });

    });

</script>

<script>

    document.addEventListener("click", function(e){

        if(!searchBox.contains(e.target) &&
            !suggestionsBox.contains(e.target)){

            suggestionsBox.innerHTML = "";

        }

    });

</script>

</body>
</html>
