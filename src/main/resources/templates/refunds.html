<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Refunds</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">My Refunds</h2>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>Refund ID</th>
            <th>Order ID</th>
            <th>Refund Amount</th>
            <th>Refund Method</th>
            <th>Status</th>
            <th>Comments</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="refund : ${refunds}">

            <td th:text="${refund.id}"></td>

            <td th:text="${refund.orderId}"></td>

            <td>
                ₹<span th:text="${refund.refundAmount}"></span>
            </td>

            <td th:text="${refund.refundMethod}"></td>

            <td>
                <span class="badge bg-success"
                      th:text="${refund.status}">
                </span>
            </td>

            <td th:text="${refund.comments}"></td>

        </tr>

        <tr th:if="${#lists.isEmpty(refunds)}">
            <td colspan="6" class="text-center">
                No refunds found.
            </td>
        </tr>

        </tbody>

    </table>

    <a href="/products" class="btn btn-primary">
        Back to Products
    </a>

</div>

</body>
</html>
