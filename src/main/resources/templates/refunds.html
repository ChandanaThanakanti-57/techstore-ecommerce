<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Refunds</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid position-relative">

        <a class="navbar-brand fw-bold position-absolute start-50 translate-middle-x"
           th:href="@{/products}">
            Tech Store
        </a>

        <div class="ms-auto">

            <a class="nav-link d-inline text-white fw-bold me-3"
               th:href="@{/products}">
                Products
            </a>

            <a class="nav-link d-inline text-white fw-bold me-3"
               th:href="@{/wishlist}">
                Wishlist
            </a>

            <a class="nav-link d-inline text-white fw-bold me-3"
               th:href="@{/cart}">
                Cart
            </a>

            <a class="nav-link d-inline text-white fw-bold me-3"
               th:href="@{/orders}">
                My Orders
            </a>

            <a class="nav-link d-inline text-white fw-bold me-3"
               th:href="@{/refunds}">
                My Refunds
            </a>

            <a class="nav-link d-inline text-white fw-bold me-3"
               th:href="@{/profile}">
                Profile
            </a>

            <a class="nav-link d-inline text-danger fw-bold"
               th:href="@{/logout}">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h2 class="mb-4">💰 My Refund History</h2>

    <table class="table table-bordered table-hover shadow">

        <thead class="table-dark">

        <tr>
            <th>Refund ID</th>
            <th>Order ID</th>
            <th>Refund Amount</th>
            <th>Refund Method</th>
            <th>Status</th>
            <th>Comments</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="refund : ${refunds}">

            <td th:text="${refund.id}"></td>

            <td th:text="${refund.orderId}"></td>

            <td>
                ₹<span th:text="${refund.refundAmount}"></span>
            </td>

            <td th:text="${refund.refundMethod}"></td>

            <td>

                <span class="badge bg-success"
                      th:if="${refund.status=='COMPLETED'}"
                      th:text="${refund.status}">
                </span>

                <span class="badge bg-warning text-dark"
                      th:if="${refund.status=='PENDING'}"
                      th:text="${refund.status}">
                </span>

                <span class="badge bg-danger"
                      th:if="${refund.status=='REJECTED'}"
                      th:text="${refund.status}">
                </span>

            </td>

            <td th:text="${refund.comments}"></td>

        </tr>

        </tbody>

    </table>

    <a th:href="@{/products}"
       class="btn btn-primary">
        ← Continue Shopping
    </a>

</div>

</body>
</html>
