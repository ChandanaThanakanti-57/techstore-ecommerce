<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Request Return</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h3>
                        Request Return
                    </h3>

                    <p>
                        Order ID:
                        <b th:text="${order.id}"></b>
                    </p>

                    <p>
                        Amount:
                        ₹<b th:text="${order.totalAmount}"></b>
                    </p>


                    <p class="text-danger"
                       th:if="${error}"
                       th:text="${error}">
                    </p>


                    <form th:action="@{'/request-return/' + ${order.id}}"
                          method="post">


                        <div class="mb-3">

                            <label>
                                Return Reason
                            </label>

                            <select name="reason"
                                    class="form-control"
                                    required>

                                <option value="">
                                    Select Reason
                                </option>

                                <option value="Damaged Product">
                                    Damaged Product
                                </option>

                                <option value="Wrong Product">
                                    Wrong Product
                                </option>

                                <option value="Size Issue">
                                    Size Issue
                                </option>

                                <option value="Other">
                                    Other
                                </option>

                            </select>

                        </div>


                        <div class="mb-3">

                            <label>
                                Comments
                            </label>

                            <textarea name="comments"
                                      class="form-control"
                                      rows="4"
                                      placeholder="Explain the issue">
                            </textarea>

                        </div>


                        <button type="submit"
                                class="btn btn-danger">

                            Submit Return Request

                        </button>


                    </form>


                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
