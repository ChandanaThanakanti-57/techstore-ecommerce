<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">


    <h2>User Registration</h2>

    <p th:if="${error}"
       class="text-danger"
       th:text="${error}">
    </p>

    <p th:if="${success}"
       class="text-success"
       th:text="${success}">
    </p>

    <form th:action="@{/register}" method="post">

        <div class="mb-3">
            <label>Name</label>
            <input type="text"
                   name="name"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Password</label>

            <div class="input-group">
                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       required>

                <button class="btn btn-outline-secondary"
                        type="button"
                        onclick="togglePassword('password')">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <div class="mb-3">
            <label>Confirm Password</label>

            <div class="input-group">
                <input type="password"
                       id="confirmPassword"
                       name="confirmPassword"
                       class="form-control"
                       required>

                <button class="btn btn-outline-secondary"
                        type="button"
                        onclick="togglePassword('password')">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <div class="mt-3">
            Already have an account?
            <a href="/login">Login Here</a>
        </div>

        <button type="submit"
                class="btn btn-primary">
            Register
        </button>

    </form>


</div>
            </div>
        </div>
    </div>
</div>
</div>
<script>
    function togglePassword(id) {

        const field = document.getElementById(id);

        if (field.type === "password") {
            field.type = "text";
        } else {
            field.type = "password";
        }
    }
</script>
</body>

</html>
