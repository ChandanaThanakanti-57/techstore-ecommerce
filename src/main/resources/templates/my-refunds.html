<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Refunds</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="container mt-5">

<h2>My Refunds</h2>

<table class="table table-bordered">

    <thead>

    <tr>
        <th>Order ID</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Refund Date</th>
    </tr>

    </thead>

    <tbody>

    <tr th:each="refund : ${refunds}">

        <td th:text="${refund.orderId}"></td>

        <td>
            ₹<span th:text="${refund.refundAmount}"></span>
        </td>

        <td>

            <span class="badge bg-warning"
                  th:if="${refund.status=='PENDING'}">

                Pending

            </span>

            <span class="badge bg-success"
                  th:if="${refund.status=='COMPLETED'}">

                Completed

            </span>

        </td>

        <td th:text="${#temporals.format(refund.refundDate,
        'dd-MM-yyyy HH:mm')}"></td>

    </tr>

    </tbody>

</table>

<a href="/orders"
   class="btn btn-secondary">
    Back
</a>

</body>
</html>
