<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<form action="/admin/orders"
      method="get"
      class="mb-3">

    <input type="text"
           name="search"
           placeholder="Search Customer Name">

    <button type="submit"
            class="btn btn-primary">

        Search

    </button>

</form>

<div class="container mt-5">

    <h2>Manage Orders</h2>

    <table class="table table-bordered table-striped">

        <thead>
        <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Total</th>
            <th>Order Date</th>
            <th>Status</th>
            <th>Update</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="order : ${orders}">

            <td th:text="${order.id}"></td>

            <td th:text="${order.customerName}"></td>

            <td>
                ₹<span th:text="${order.totalAmount}"></span>
            </td>

            <td th:text="${#temporals.format(order.orderDate,
                    'dd-MM-yyyy HH:mm')}"></td>

            <td>
                <span class="badge bg-warning"
                      th:if="${order.status == 'Pending'}">
                    Pending
                </span>

                <span class="badge bg-primary"
                      th:if="${order.status == 'Processing'}">
                    Processing
                </span>

                <span class="badge bg-info"
                      th:if="${order.status == 'Shipped'}">
                    Shipped
                </span>

                <span class="badge bg-success"
                      th:if="${order.status == 'Delivered'}">
                    Delivered
                </span>

                <span class="badge bg-danger"
                      th:if="${order.status == 'Cancelled'}">
    Cancelled
</span>

                <span class="badge bg-secondary"
                      th:if="${order.status == 'Returned'}">
    Returned
</span>
            </td>

            <td>
                <form th:action="@{/admin/update-status}"
                      method="post">

                    <input type="hidden"
                           name="orderId"
                           th:value="${order.id}">

                    <select name="status"
                            class="form-select">

                        <option value="Ordered"
                                th:selected="${order.status=='Ordered'}">
                            Ordered
                        </option>

                        <option value="Confirmed"
                                th:selected="${order.status=='Confirmed'}">
                            Confirmed
                        </option>

                        <option value="Shipped"
                                th:selected="${order.status=='Shipped'}">
                            Shipped
                        </option>

                        <option value="Out For Delivery"
                                th:selected="${order.status=='Out For Delivery'}">
                            Out For Delivery
                        </option>

                        <option value="Delivered"
                                th:selected="${order.status=='Delivered'}">
                            Delivered
                        </option>

                    </select>

                    <button type="submit"
                            class="btn btn-success btn-sm mt-2">
                        Update
                    </button>

                </form>

                <div class="mt-2"
                     th:if="${order.status == 'Cancelled'}">

                    <a th:href="@{/admin/refund/create/{id}(id=${order.id})}"
                       class="btn btn-warning btn-sm">

                        Refund

                    </a>

                </div>

            </td>

        </tr>

        </tbody>

    </table>

    <a href="/admin"
       class="btn btn-secondary">
        Back Dashboard
    </a>

</div>

</body>
</html>
